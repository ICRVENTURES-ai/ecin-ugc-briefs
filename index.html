<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECIN / Shoot Briefs</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    font-size: 16px; -webkit-text-size-adjust: 100%;
    background-color: #0a0a0a;
    background-image: url('https://raw.githubusercontent.com/icrventures-ai/ecin-ugc-briefs/main/bg.jpg');
    background-attachment: fixed;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center top;
    min-height: 100vh;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e8eaed; line-height: 1.6;
    max-width: 520px; margin: 0 auto; padding: 0 0 80px;
    -webkit-font-smoothing: antialiased;
    background: transparent;
    min-height: 100vh;
  }
  header {
    padding: 24px 20px 20px;
    border-bottom: 3px solid #FF6B00; margin-bottom: 24px;
    background: rgba(0,0,0,0.55);
  }
  .header-top {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .logo-box {
    width: 32px; height: 32px; background: #FF6B00; border-radius: 6px;
    display: grid; place-items: center; color: #000; font-weight: 900; font-size: 16px;
    flex-shrink: 0;
  }
  .header-label {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #aab0b8; font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  header h1 {
    font-size: 24px; font-weight: 800; line-height: 1.25; color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
  }
  .list { padding: 0 12px; }
  .brief-card {
    display: flex; align-items: center;
    background: rgba(0,0,0,0.55); border: 1px solid #2a3038; border-radius: 12px;
    margin-bottom: 12px; overflow: hidden;
    transition: border-color 0.15s;
    min-height: 60px;
  }
  .brief-card:hover { border-color: #FF6B00; }
  .card-link {
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px; padding: 18px 20px; flex: 1; min-width: 0;
    text-decoration: none; color: inherit; min-height: 60px;
  }
  .card-left { flex: 1; min-width: 0; }
  .card-name {
    font-size: 15px; font-weight: 700; color: #e8eaed;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-date {
    font-size: 12px; color: #6b7480; margin-top: 2px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .card-arrow {
    font-size: 18px; color: #FF6B00; flex-shrink: 0; line-height: 1;
  }
  @media (min-width: 541px) {
    body { width: 520px; }
  }
  @media (max-width: 540px) {
    html { background-attachment: scroll; }
    .list { padding: 0 12px; }
    header { padding: 20px 12px 16px; }
    header h1 { font-size: 20px; }
    .header-label { font-size: 10px; }
    .card-name { font-size: 14px; }
    .card-date { font-size: 11px; }
  }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo-box">E</div>
    <span class="header-label">ECIN / SHOOT BRIEFS</span>
  </div>
  <h1>All Briefs.</h1>
</header>
<div class="list">

</div>
</body>
</html>
